services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
